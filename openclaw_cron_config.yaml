# OpenClaw Cron Configuration for AdGuard Alert Sender
# This runs the alert sender every minute to check for new alerts

jobs:
  - name: "AdGuard Alert Sender"
    schedule: "* * * * *"  # Every minute
    command: "/Library/Frameworks/Python.framework/Versions/3.14/bin/python3 /Users/ace/.openclaw/workspace/openclaw_alert_sender.py --once"
    workingDir: "/Users/ace/.openclaw/workspace"
    env:
      PATH: "/Library/Frameworks/Python.framework/Versions/3.14/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"
      PYTHONPATH: "/Users/ace/.openclaw/workspace"
    
  - name: "AdGuard System Status Check"
    schedule: "*/5 * * * *"  # Every 5 minutes
    command: "/Library/Frameworks/Python.framework/Versions/3.14/bin/python3 /Users/ace/.openclaw/workspace/openclaw_alert_sender.py --status"
    workingDir: "/Users/ace/.openclaw/workspace"
    
  - name: "Clean Old Logs"
    schedule: "0 2 * * *"  # Daily at 2 AM
    command: "find /Users/ace/.openclaw/workspace/logs -name \"*.log\" -mtime +7 -delete"
    
  - name: "Monitor Service Health Check"
    schedule: "*/10 * * * *"  # Every 10 minutes
    command: "/Users/ace/.openclaw/workspace/check_alerts.sh"
    workingDir: "/Users/ace/.openclaw/workspace"

# Alert routing configuration
alert_routing:
  telegram:
    enabled: true
    # Messages will be sent to the current OpenClaw Telegram session
    # No need for chat ID since we're already in the chat
    
  fallback:
    enabled: true
    file: "/Users/ace/.openclaw/workspace/alert_fallback.log"
    
  notification_throttling:
    max_per_hour: 20  # Max 20 alerts per hour
    min_interval_seconds: 30  # Minimum 30 seconds between alerts

# Monitoring configuration
monitoring:
  check_interval_seconds: 30
  alert_cooldown_minutes: 5
  max_queue_size: 100
  auto_cleanup_days: 7